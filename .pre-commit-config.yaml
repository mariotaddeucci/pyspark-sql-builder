repos:
  - repo: local
    hooks:
      - id: ruff-fix
        name: ruff check --fix
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: pyrefly
        name: pyrefly check
        entry: uv run pyrefly check src/
        language: system
        types_or: [python, pyi]
        pass_filenames: false
        require_serial: true
